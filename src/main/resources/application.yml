server:
  port: 8080

spring:
  application:
    name: metric-analyst-agent

  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/metric_analyst?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${MYSQL_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: validate  # 生产环境使用validate，不自动修改表结构
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  # AI配置
  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key}
      chat:
        options:
          model: qwen-turbo
          temperature: 0.7

# 日志配置
logging:
  level:
    com.metric.analyst.agent: DEBUG
    org.springframework.ai: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# 应用配置
app:
  # 向量检索配置
  vector:
    enabled: true
    top-k: 10
  # 意图分类配置
  intent:
    classification-enabled: true
  # 指标识别配置
  recognition:
    confidence-threshold: 0.6
    high-confidence: 0.8
