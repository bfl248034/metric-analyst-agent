server:
  port: 8080

spring:
  application:
    name: metric-analyst-agent

  # AI 配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:}
      model: qwen-turbo

# Skills 配置
skills:
  directory: src/main/resources/skills

# 日志
logging:
  level:
    com.metric.analyst.agent: DEBUG
    com.alibaba.cloud.ai: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
