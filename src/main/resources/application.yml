server:
  port: 8080

spring:
  application:
    name: metric-analyst-agent

  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:metricdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # AI 配置 - 使用 DashScope
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:demo-key}
      chat:
        options:
          model: qwen-turbo

# 日志
logging:
  level:
    com.metric.analyst.agent: INFO
    org.springframework.ai: DEBUG
