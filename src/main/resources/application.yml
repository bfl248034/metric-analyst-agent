server:
  port: 8080

spring:
  application:
    name: metric-analyst-agent

  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:metricdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false

  # H2 Console
  h2:
    console:
      enabled: true
      path: /h2-console

  # AI 配置 - 支持多模型
  ai:
    # DashScope (通义千问)
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:demo-key}
      chat:
        options:
          model: ${DASHSCOPE_MODEL:qwen-turbo}
    
    # OpenAI 兼容接口（Kimi/DeepSeek/其他）
    openai:
      api-key: ${AI_API_KEY:demo-key}
      base-url: ${AI_BASE_URL:https://api.moonshot.cn/v1}
      chat:
        options:
          model: ${AI_MODEL:moonshot-v1-8k}
          temperature: 0.7

# 默认使用的模型: dashscope | openai
model:
  default-provider: ${DEFAULT_MODEL_PROVIDER:dashscope}

# 日志
logging:
  level:
    com.metric.analyst.agent: INFO
    org.springframework.ai: DEBUG
