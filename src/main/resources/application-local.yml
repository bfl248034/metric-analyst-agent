spring:
  # 本地开发使用 H2 内存数据库
  datasource:
    url: jdbc:h2:mem:metricdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:demo-key}

logging:
  level:
    com.metric.analyst.agent: DEBUG
    org.springframework.ai: DEBUG
