server:
  port: 8080

spring:
  application:
    name: metric-analyst-agent

  # H2 内存数据库
  datasource:
    url: jdbc:h2:mem:metricdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # H2 Console（调试用）
  h2:
    console:
      enabled: true
      path: /h2-console

  # AI 配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY:demo-key}
      model: qwen-turbo

# 日志
logging:
  level:
    com.metric.analyst.agent: INFO
    org.springframework.web: INFO
  pattern:
    console: "%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
